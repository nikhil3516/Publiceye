version: "3.9"
services:
  postgres:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: publiceye_user
      POSTGRES_PASSWORD: publiceye_pass
      POSTGRES_DB: publiceye_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - postgres
      - redis
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
